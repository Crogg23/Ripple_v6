      - name: address_street
        description: Street name of the registered address.

      - name: address_house_number
        description: House number of the registered address.

      - name: address_zip
        description: Postal code of the registered address.

      - name: address_city
        description: City of the registered address.

      - name: address_canton
        description: Canton abbreviation of the registered address.

      - name: registry_of_commerce
        description: Name or identifier of the cantonal registry of commerce.

      - name: old_names
        description: Previous registered names of the company.

      - name: sogc_publication_date
        description: Date of the most recent SOGC publication.

      - name: mutation_type
        description: Type of the most recent mutation recorded in the SOGC.

      - name: community_bfs_id
        description: Swiss BFS municipality identifier (integer).

      - name: _ingested_at
        description: Timestamp when the record was ingested into the landing table.
        data_tests:
          - not_null

      - name: _source_run_id
        description: Pipeline run identifier that produced this record.
