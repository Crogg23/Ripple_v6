          - not_null

      - name: country
        description: ISO country code; always CH for this source.
        data_tests:
          - not_null
          - accepted_values:
              values: ['CH']

      - name: name
        description: Registered business name.
        data_tests:
          - not_null

      - name: legal_form
        description: Legal form of the company (e.g. AG, GmbH, Einzelunternehmen).

      - name: status
        description: Current registration status of the company.
        data_tests:
          - accepted_values:
              values:
                - ACTIVE
                - DELETED
                - BEING_CANCELLED
