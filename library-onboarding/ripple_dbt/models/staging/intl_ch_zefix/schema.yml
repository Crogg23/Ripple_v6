version: 2

sources:
  - name: ripple_raw
    database: LIBRARY_RAW
    schema: LANDING
    tables:
      - name: INTL_CH_ZEFIX
        description: >
          Raw landing table for the Switzerland Zefix Central Business Name Index.
          All columns arrive as TEXT and are cast in the staging model.

models:
  - name: stg_intl_ch_zefix__companies
    description: >
      Staged and deduplicated view of the Switzerland Zefix company register.
      TEXT columns are cast to appropriate types; one row per company_id
      (most-recent ingest wins).
    columns:
      - name: company_id
        description: Surrogate key derived from uid, ehraid, and chid.
        data_tests:
          - unique
          - not_null

      - name: uid
        description: Swiss Unique Identification Number (UID) for the company.
        data_tests:
          - not_null

      - name: ehraid
        description: Internal ZEFIX identifier (EHRA ID) for the company.
        data_tests:
          - not_null

      - name: chid
        description: Swiss Commercial Register (CH-ID) identifier.
        data_tests:
          - not_null

      - name: country
        description: ISO country code; always CH for this source.
        data_tests:
          - not_null
          - accepted_values:
              values: ['CH']

      - name: name
        description: Registered business name.
        data_tests:
          - not_null

      - name: legal_form
        description: Legal form of the company (e.g. AG, GmbH, Einzelunternehmen).

      - name: status
        description: Current registration status of the company.
        data_tests:
          - accepted_values:
              values:
                - ACTIVE
                - DELETED
                - BEING_CANCELLED
                - CANCELLED
              severity: warn

      - name: address_street
        description: Street name of the registered address.

      - name: address_house_number
        description: House number of the registered address.

      - name: address_zip
        description: Postal code of the registered address.

      - name: address_city
        description: City of the registered address.

      - name: address_canton
        description: Canton abbreviation of the registered address (e.g. ZH, BE, GE).

      - name: registry_of_commerce
        description: Name or identifier of the cantonal registry of commerce.

      - name: old_names
        description: Previous registered names of the company (JSON array or delimited string).

      - name: sogc_publication_date
        description: Date of the most recent publication in the Swiss Official Gazette of Commerce (SOGC).

      - name: mutation_type
        description: Type of the most recent mutation recorded in the SOGC.

      - name: community_bfs_id
        description: Swiss Federal Statistical Office (BFS) municipality identifier (integer).

      - name: _ingested_at
        description: Timestamp when the record was ingested into the landing table.
        data_tests:
          - not_null

      - name: _source_run_id
        description: Pipeline run identifier that produced this record.

  - name: economics__intl_ch_zefix
    description: >
      Analytics-ready mart table for the Switzerland Zefix Central Business
