version: 2

sources:
  - name: ripple_raw
    database: LIBRARY_RAW
    schema: LANDING
    tables:
      - name: FED_NAAG_MULTISTATE_SETTLEMENTS
        description: >-
          Raw landing table for the NAAG Multistate Settlements Database.
          All columns arrive as TEXT and are cast in the staging layer.

models:
  - name: stg_fed_naag_multistate_settlements__multistate_settlements
    description: >-
      Staging model for NAAG Multistate Settlements. Renames columns to
      snake_case, casts TEXT values to appropriate types, and deduplicates
      on the natural key (company_id, date, state).
    columns:
      - name: company_id
        description: Identifier for the company involved in the settlement.
        data_tests:
          - not_null

      - name: date
        description: Date of the settlement (cast from TEXT to DATE).
        data_tests:
          - not_null

      - name: state
        description: US state participating in the multistate settlement.
        data_tests:
          - not_null

      - name: company_name
        description: Legal name of the company involved in the settlement.

      - name: settlement_amount
        description: Monetary value of the settlement in USD (cast to DOUBLE).

      - name: case_description
        description: Narrative description of the case and alleged violations.

      - name: industry
        description: Industry sector of the company involved.

      - name: lead_state
        description: The state that led the multistate coalition in the case.

      - name: num_states
        description: Number of states participating in the settlement (cast to NUMBER).

      - name: document_url
        description: URL to the official settlement document.

      - name: _ingested_at
        description: Timestamp when the record was ingested into the landing table.

      - name: _source_run_id
        description: Identifier for the pipeline run that loaded the record.

  - name: legal_enforcement__fed_naag_multistate_settlements
    description: >-
      Analytics-ready mart table for NAAG Multistate Settlements. Exposes
      key identifiers for cross-source joins and adds convenience columns
      such as settlement year, month, and a surrogate key.
    columns:
      - name: settlement_sk
        description: >-
          Surrogate key generated from company_id, settlement_date, and state.
          Serves as the primary key for this mart table.
        data_tests:
          - unique
          - not_null

      - name: company_id
        description: Identifier for the company involved in the settlement.
        data_tests:
          - not_null

      - name: settlement_date
        description: Date of the settlement.
        data_tests:
          - not_null

      - name: state
        description: US state participating in the multistate settlement.
        data_tests:
          - not_null

      - name: company_name
        description: Legal name of the company involved in the settlement.

      - name: settlement_amount
        description: Monetary value of the settlement in USD.

      - name: case_description
        description: Narrative description of the case and alleged violations.

      - name: industry
        description: Industry sector of the company involved.

      - name: lead_state
        description: The state that led the multistate coalition in the case.

      - name: num_states
        description: Number of states participating in the settlement.

      - name: document_url
        description: URL to the official settlement document.

      - name: settlement_year
        description: Calendar year extracted from settlement_date for time-series analysis.

      - name: settlement_month
        description: Calendar month extracted from settlement_date for time-series analysis.

      - name: is_lead_state_row
        description: >-
          Boolean flag indicating whether this row represents the lead state
          in the multistate coalition (lead_state = state).
        data_tests:
          - accepted_values:
              values: [true, false]

      - name: _ingested_at
        description: Timestamp when the record was ingested into the landing table.

      - name: _source_run_id
        description: Identifier for the pipeline run that loaded the record.
