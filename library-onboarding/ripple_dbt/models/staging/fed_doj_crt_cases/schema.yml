version: 2

sources:
  - name: ripple_raw
    database: LIBRARY_RAW
    schema: LANDING
    tables:
      - name: FED_DOJ_CRT_CASES
        description: >-
          Raw landing table for the DOJ Civil Rights Division Cases and
          Settlements Database. All columns are TEXT as received from the
          source system.

models:

  - name: stg_fed_doj_crt_cases__crt_cases
    description: >-
      Staged and lightly transformed view of DOJ Civil Rights Division cases.
      Columns are renamed to snake_case, TEXT values are cast to appropriate
      types, and duplicate rows (by company_id, person_name, date, state) are
      removed, keeping the most-recently ingested record.
    columns:

      - name: case_title
        description: Title or name of the civil rights case.

      - name: section
        description: DOJ Civil Rights Division section responsible for the case.

      - name: case_type
        description: Classification / type of the civil rights case.

      - name: company_id
        description: Identifier for the company or entity involved in the case.
        data_tests:
          - not_null

      - name: person_name
        description: Name of the individual associated with the case record.
        data_tests:
          - not_null

      - name: date
        description: Relevant date of the case or settlement (cast from TEXT).
        data_tests:
          - not_null

      - name: state
        description: US state in which the case is or was active.
        data_tests:
          - not_null
          - accepted_values:
              values:
                - AL - AK - AZ - AR - CA - CO - CT - DE - FL - GA
                - HI - ID - IL - IN - IA - KS - KY - LA - ME - MD
                - MA - MI - MN - MS - MO - MT - NE - NV - NH - NJ
                - NM - NY - NC - ND - OH - OK - OR - PA - RI - SC
                - SD - TN - TX - UT - VT - VA - WA - WV - WI - WY
                - DC - PR - GU - VI - AS - MP
              quote: false

      - name: document_url
        description: URL linking to the official case or settlement document.

      - name: description
        description: Free-text description of the case and its key facts.

      - name: status
        description: Current status of the case (e.g. Open, Settled, Closed).
        data_tests:
          - accepted_values:
              values:
                - Open
                - Settled
                - Closed
                - Pending
                - Dismissed
                - Ongoing
              quote: true

      - name: _ingested_at
        description: Timestamp when the record was ingested into the landing table.

      - name: _source_run_id
        description: Pipeline run identifier that produced this record.

  - name: justice__fed_doj_crt_cases
    description: >-
      Analytics-ready mart table for DOJ Civil Rights Division cases and
      settlements. One row per unique combination of company_id, person_name,
      date, and state. Includes a surrogate key for cross-source joins.
    columns:

      - name: crt_case_key
        description: >-
          Surrogate key generated from company_id, person_name, date, and state.
          Serves as the primary key for this mart table.
        data_tests:
          - unique
          - not_null

      - name: company_id
        description: Identifier for the company or entity involved in the case.
        data_tests:
          - not_null

      - name: person_name
        description: Name of the individual associated with the case record.
        data_tests:
          - not_null

      - name: date
        description: Relevant date of the case or settlement.
        data_tests:
          - not_null

      - name: state
        description: US state in which the case is or was active.
        data_tests:
          - not_null

      - name: case_title
        description: Title or name of the civil rights case.

      - name: section
        description: DOJ Civil Rights Division section responsible for the case.

      - name: case_type
        description: Classification / type of the civil rights case.

      - name: status
        description: Current status of the case.
        data_tests:
          - accepted_values:
              values:
                - Open
                - Settled
                - Closed
                - Pending
                - Dismissed
                - Ongoing
              quote: true

      - name: document_url
        description: URL linking to the official case or settlement document.

      - name: description
        description: Free-text description of the case and its key facts.

      - name: _ingested_at
        description: Timestamp when the record was ingested into the landing table.

      - name: _source_run_id
        description: Pipeline run identifier that produced this record.
