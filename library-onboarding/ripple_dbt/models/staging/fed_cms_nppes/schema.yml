version: 2

sources:
  - name: ripple_raw
    database: LIBRARY_RAW
    schema: LANDING
    tables:
      - name: FED_CMS_NPPES
        description: >
          Raw landing table for the NPPES National Plan and Provider Enumeration System.
          Contains all 330 columns as TEXT, ingested from the CMS public data release.

models:
  - name: stg_fed_cms_nppes__npi_providers
    description: >
      Staging view over the NPPES raw landing table. Deduplicates on NPI (most recent
      _ingested_at wins). All columns are passed through as-is from the wide 330-column
      source; no per-column casting is applied at this layer.
    columns:
      - name: NPI
        description: National Provider Identifier — the primary key for this entity.
        data_tests:
          - unique
          - not_null
      - name: EIN
        description: Employer Identification Number associated with the provider organization.
        data_tests:
          - not_null:
              config:
                severity: warn
      - name: Provider_Business_Mailing_Address_Postal_Code
        description: >-
          ZIP / postal code from the provider's business mailing address. Mapped to the
          'zip' key identifier for cross-source joins.
        data_tests:
          - not_null:
              config:
                severity: warn

  - name: health__fed_cms_nppes
    description: >
      Analytics-ready mart table for NPPES NPI providers. Materialised as a table for
      query performance. Exposes all staging columns including the key identifiers NPI,
      EIN, and ZIP for cross-source joins within the Ripple warehouse.
    columns:
      - name: NPI
        description: National Provider Identifier — primary key.
        data_tests:
          - unique
          - not_null
      - name: EIN
        description: Employer Identification Number.
        data_tests:
          - not_null:
              config:
                severity: warn
      - name: Provider_Business_Mailing_Address_Postal_Code
        description: Provider mailing address ZIP code (key identifier).
        data_tests:
          - not_null:
              config:
                severity: warn
