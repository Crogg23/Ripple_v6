version: 2

sources:
  - name: ripple_raw
    database: LIBRARY_RAW
    schema: LANDING
    tables:
      - name: FED_NARA_WRA_AAD
        description: >
          Raw landing table for NARA AAD Series 623 — Records About Japanese Americans
          Relocated During World War II. All columns arrive as TEXT.

models:

  - name: stg_fed_nara_wra_aad__japanese_american_relocation_records
    description: >
      Staging view for NARA WRA AAD Series 623. Renames columns to snake_case,
      casts TEXT to proper types, and removes duplicate rows by record_id.
    columns:

      - name: record_id
        description: Unique identifier for an individual relocation record.
        data_tests:
          - unique
          - not_null

      - name: series_id
        description: NARA AAD series identifier (Series 623).
        data_tests:
          - not_null

      - name: person_name
        description: Full name of the relocated individual.
        data_tests:
          - not_null

      - name: record_date
        description: Parsed date of the record (try_to_date applied).
        data_tests:
          - not_null

      - name: raw_date
        description: Original raw date string from the source.

      - name: camp_location
        description: Name or code of the War Relocation Authority camp.
        data_tests:
          - not_null

      - name: fips
        description: FIPS geographic code associated with the record.
        data_tests:
          - not_null

      - name: geo
        description: Geographic label or coordinates paired with the FIPS code.
        data_tests:
          - not_null

      - name: age
        description: Age of the individual at time of record (cast to numeric).

      - name: sex
        description: Sex of the individual, uppercased.
        data_tests:
          - accepted_values:
              values: ['M', 'F', 'MALE', 'FEMALE', 'U', 'UNKNOWN']
              quote: true
              severity: warn

      - name: citizenship_status
        description: Citizenship status of the individual, uppercased.
        data_tests:
          - accepted_values:
              values:
                - 'US CITIZEN'
                - 'ALIEN'
                - 'UNKNOWN'
                - 'NISEI'
                - 'ISSEI'
                - 'KIBEI'
                - 'SANSEI'
              quote: true
              severity: warn

      - name: family_number
        description: Family unit identifier used by the WRA.

      - name: notes_field
        description: Free-text notes attached to the record.

      - name: _ingested_at
        description: Timestamp when the row was ingested into the landing table.

      - name: _source_run_id
        description: Pipeline run ID that produced this row.

  - name: civil_rights__fed_nara_wra_aad
    description: >
      Analytics-ready mart table for NARA WRA AAD Series 623 — Records About
      Japanese Americans Relocated During World War II. Exposes all key identifiers
      for cross-source civil-rights joins and adds source lineage metadata.
    columns:

      - name: record_id
        description: Unique identifier for an individual relocation record (primary key).
        data_tests:
          - unique
          - not_null

      - name: series_id
        description: NARA AAD series identifier.
        data_tests:
          - not_null

      - name: person_name
        description: Full name of the relocated individual.
        data_tests:
          - not_null

      - name: record_date
        description: Typed date of the record.
        data_tests:
          - not_null

      - name: raw_date
        description: Original raw date string retained for auditing.

      - name: camp_location
        description: Name or code of the War Relocation Authority camp.
        data_tests:
          - not_null

      - name: fips
        description: FIPS geographic code — key for geo joins.
        data_tests:
          - not_null

      - name: geo
        description: Geographic label paired with the FIPS code.
        data_tests:
          - not_null

      - name: age
        description: Age of the individual (numeric).

      - name: sex
        description: Sex of the individual.
        data_tests:
          - accepted_values:
              values: ['M', 'F', 'MALE', 'FEMALE', 'U', 'UNKNOWN']
              quote: true
              severity: warn

      - name: citizenship_status
        description: Citizenship status of the individual.
        data_tests:
          - accepted_values:
              values:
                - 'US CITIZEN'
                - 'ALIEN'
                - 'UNKNOWN'
                - 'NISEI'
                - 'ISSEI'
                - 'KIBEI'
                - 'SANSEI'
              quote: true
              severity: warn

      - name: family_number
        description: Family unit identifier.

      - name: notes_field
        description: Free-text notes.

      - name: source_id
        description: Constant identifier for this source (fed_nara_wra_aad).
        data_tests:
          - not_null

      - name: entity_type
        description: Constant entity label for this mart.
        data_tests:
          - not_null

      - name: _ingested_at
        description: Timestamp when the row was ingested.

      - name: _source_run_id
        description: Pipeline run ID that produced this row.
