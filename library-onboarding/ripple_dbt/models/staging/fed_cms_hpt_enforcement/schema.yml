version: 2

sources:
  - name: ripple_raw
    database: RIPPLE_RAW
    schema: LANDING
    tables:
      - name: FED_CMS_HPT_ENFORCEMENT
        description: >
          Raw landing table for CMS Hospital Price Transparency enforcement
          activities and outcomes. All columns are loaded as TEXT.

models:
  - name: stg_fed_cms_hpt_enforcement__hospital_price_transparency_enforcement
    description: >
      Staging model for CMS Hospital Price Transparency enforcement data.
      Casts TEXT columns to appropriate types, deduplicates on NPI +
      hospital_name + action_date + enforcement_action_type, and carries
      through ingestion metadata.
    columns:
      - name: hospital_name
        description: Name of the hospital subject to enforcement action.
        data_tests:
          - not_null

      - name: npi
        description: National Provider Identifier for the hospital.
        data_tests:
          - not_null

      - name: state
        description: State where the hospital is located (two-letter abbreviation).

      - name: city
        description: City where the hospital is located.

      - name: enforcement_action_type
        description: >
          Type of enforcement action issued by CMS (e.g., warning notice,
          corrective action plan, civil monetary penalty).
        data_tests:
          - accepted_values:
              values:
                - 'Warning Notice'
                - 'Corrective Action Plan'
                - 'Civil Monetary Penalty'
                - 'warning notice'
                - 'corrective action plan'
                - 'civil monetary penalty'
              quote: true

      - name: action_date
        description: Date the enforcement action was issued.

      - name: outcome
        description: Result or current status of the enforcement action.

      - name: penalty_amount
        description: Dollar amount of any civil monetary penalty assessed (cast to DOUBLE).

      - name: corrective_action_plan
        description: Indicator or details of whether a corrective action plan was required.

      - name: compliance_status
        description: Current compliance status of the hospital.

      - name: _ingested_at
        description: Timestamp when the record was ingested into the landing layer.

      - name: _source_run_id
        description: Identifier for the source pipeline run that loaded the record.

  - name: health__fed_cms_hpt_enforcement
    description: >
      Analytics-ready mart table for CMS Hospital Price Transparency
      enforcement activities and outcomes. Includes a surrogate primary key,
      derived compliance flags, and key identifiers exposed for cross-source
      joins (NPI, hospital_name).
    columns:
      - name: enforcement_action_key
        description: >
          Surrogate primary key derived from NPI, hospital_name, action_date,
          and enforcement_action_type.
        data_tests:
          - unique
          - not_null

      - name: npi
        description: National Provider Identifier — key identifier for cross-source joins.
        data_tests:
          - not_null

      - name: hospital_name
        description: Name of the hospital — key identifier for cross-source joins.
        data_tests:
          - not_null

      - name: city
        description: City where the hospital is located.

      - name: state
        description: State where the hospital is located.

      - name: enforcement_action_type
        description: Type of enforcement action issued by CMS.
        data_tests:
          - accepted_values:
              values:
                - 'Warning Notice'
                - 'Corrective Action Plan'
                - 'Civil Monetary Penalty'
                - 'warning notice'
                - 'corrective action plan'
                - 'civil monetary penalty'
              quote: true

      - name: action_date
        description: Date the enforcement action was issued.

      - name: outcome
        description: Result or current status of the enforcement action.

      - name: penalty_amount
        description: Dollar amount of any civil monetary penalty assessed.

      - name: corrective_action_plan
        description: Raw indicator or details of whether a corrective action plan was required.

      - name: compliance_status
        description: Current compliance status of the hospital as provided by CMS.

      - name: has_civil_monetary_penalty
        description: Boolean flag — true when a non-zero penalty amount is present.

      - name: requires_corrective_action_plan
        description: Boolean flag derived from the corrective_action_plan field.

      - name: compliance_status_normalized
        description: >
          Normalized compliance status bucketed into compliant, non-compliant,
          or pending based on keyword matching.
        data_tests:
          - accepted_values:
              values:
                - 'compliant'
                - 'non-compliant'
                - 'pending'
              quote: true

      - name: _ingested_at
        description: Timestamp when the record was ingested into the landing layer.

      - name: _source_run_id
        description: Identifier for the source pipeline run that loaded the record.
