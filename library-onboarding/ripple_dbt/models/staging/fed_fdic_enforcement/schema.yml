version: 2

sources:
  - name: ripple_raw
    database: LIBRARY_RAW
    schema: LANDING
    tables:
      - name: FED_FDIC_ENFORCEMENT
        description: >
          Raw landing table for FDIC Enforcement Decisions and Orders.
          All columns are loaded as TEXT from the source feed.
        columns:
          - name: RAW_TEXT
            description: Full raw JSON or delimited text payload from the FDIC enforcement feed.
          - name: ORDER_URL
            description: Direct URL to the enforcement order document on the FDIC website.

models:
  - name: stg_fed_fdic_enforcement__enforcement_orders
    description: >
      Staging view for FDIC Enforcement Decisions and Orders.
      Renames raw columns to snake_case, casts TEXT fields to appropriate types,
      and deduplicates records by docket_number + fdic_cert_number + respondent.
    columns:
      - name: docket_number
        description: Unique FDIC docket number assigned to the enforcement action.
        data_tests:
          - not_null:
              config:
                severity: warn
      - name: fdic_cert_number
        description: FDIC certificate number identifying the regulated institution.
        data_tests:
          - not_null:
              config:
                severity: warn
      - name: company_id
        description: Cross-source company identifier; mirrors fdic_cert_number for federation.
        data_tests:
          - not_null:
              config:
                severity: warn
      - name: respondent_name
        description: Name of the institutional respondent named in the enforcement order.
        data_tests:
          - not_null:
              config:
                severity: warn
      - name: person_name
        description: Name of the individual respondent (if applicable) named in the enforcement order.
        data_tests:
          - not_null:
              config:
                severity: warn
      - name: date
        description: Effective date of the enforcement order.
        data_tests:
          - not_null:
              config:
                severity: warn
      - name: nmls_id
        description: Nationwide Multistate Licensing System identifier for individual respondents.
        data_tests:
          - not_null:
              config:
                severity: warn
      - name: order_url
        description: URL to the enforcement order document.

      - name: institution_name
        description: Name of the FDIC-regulated institution.

      - name: city
        description: City where the institution is located.

      - name: state
        description: State where the institution is located.

      - name: action_type
        description: Category or type of enforcement action (e.g., Consent Order, Civil Money Penalty).

      - name: termination_date
        description: Date on which the enforcement order was terminated, if applicable.

      - name: raw_text
        description: Original raw text payload preserved for auditability.

      - name: _ingested_at
        description: Timestamp when the record was processed by the staging layer.

      - name: _source_run_id
        description: Identifier for the pipeline run that loaded this record.

  - name: regulation__fed_fdic_enforcement
    description: >
      Analytics-ready mart table for FDIC Enforcement Decisions and Orders.
      Exposes key identifiers for cross-source joins and enriches with descriptive attributes.
    columns:
      - name: enforcement_order_id
        description: >
          Surrogate primary key derived from docket_number, fdic_cert_number,
          and the coalesced respondent name.
        data_tests:
          - unique
          - not_null

      - name: company_id
        description: Cross-source company identifier; mirrors fdic_cert_number.
        data_tests:
          - not_null:
              config:
                severity: warn
      - name: fdic_cert_number
        description: FDIC certificate number identifying the regulated institution.
        data_tests:
          - not_null:
              config:
                severity: warn
      - name: docket_number
        description: Unique FDIC docket number for the enforcement action.
        data_tests:
          - not_null:
              config:
                severity: warn
      - name: respondent_name
        description: Name of the institutional respondent.
        data_tests:
          - not_null:
              config:
                severity: warn
      - name: person_name
        description: Name of the individual respondent, if applicable.
        data_tests:
          - not_null:
              config:
                severity: warn
      - name: order_date
        description: Effective date of the enforcement order.
        data_tests:
          - not_null:
              config:
                severity: warn
      - name: nmls_id
        description: NMLS identifier for individual respondents.
        data_tests:
          - not_null:
              config:
                severity: warn
      - name: institution_name
        description: Name of the FDIC-regulated institution.

      - name: city
        description: City where the institution is located.

      - name: state
        description: State where the institution is located.

      - name: action_type
        description: Category of enforcement action.

      - name: termination_date
        description: Date the enforcement order was terminated, if applicable.

      - name: order_url
        description: URL to the enforcement order document.

      - name: source_id
        description: Static tag identifying the originating source system (fed_fdic_enforcement).
        data_tests:
          - accepted_values:
              values: ['fed_fdic_enforcement']

      - name: _ingested_at
        description: Timestamp when the record was processed.

      - name: _source_run_id
        description: Identifier for the pipeline run that produced this record.
